# FitCheck production stack.
# Runs the FastAPI backend behind Caddy (auto-TLS via Let's Encrypt).
# Intended to be deployed to a single VPS (Hostinger KVM 1 or similar).
#
# Usage:
#   docker compose up -d --build
#
# Required on the host:
#   - /opt/fitcheck/.env  (mounted into the backend container)
#   - DNS A record: api.myfitz.us -> VPS public IP
#
# Caddy handles TLS automatically on first request once DNS resolves.

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: "https://aaqpcgiohgaumgkthlbm.supabase.co"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhcXBjZ2lvaGdhdW1na3RobGJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTYzMDYsImV4cCI6MjA5MjA3MjMwNn0.XNNr24GERjyZyADx82PKuoQXtsmMzotTHVr-stppxnM"
        NEXT_PUBLIC_API_BASE_URL: "/api"
    image: fitcheck-frontend:latest
    container_name: fitcheck-frontend
    restart: unless-stopped
    expose:
      - "3005"
    depends_on:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: fitcheck-backend:latest
    container_name: fitcheck-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: fitcheck-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
