# FitCheck production stack.
# Runs the Next.js frontend and FastAPI backend directly on public ports so
# the app can coexist with an existing reverse proxy on the host.
#
# Usage:
#   docker compose up -d --build

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: "https://aaqpcgiohgaumgkthlbm.supabase.co"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhcXBjZ2lvaGdhdW1na3RobGJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTYzMDYsImV4cCI6MjA5MjA3MjMwNn0.XNNr24GERjyZyADx82PKuoQXtsmMzotTHVr-stppxnM"
        NEXT_PUBLIC_API_BASE_URL: "http://2.24.212.226:8001"
    image: fitcheck-frontend:latest
    container_name: fitcheck-frontend
    restart: unless-stopped
    ports:
      - "3005:3005"
    depends_on:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: fitcheck-backend:latest
    container_name: fitcheck-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
